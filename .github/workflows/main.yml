name: Build with Debug Signature

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Build with Debug
      run: go build -v -o ./build/app .
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: debug-build
        path: ./build/
        retention-days: 30
